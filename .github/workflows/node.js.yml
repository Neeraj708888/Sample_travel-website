name: CI + Deploy (Next.js + Supabase)

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - uses: actions/checkout@v4

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 🔥 IMPORTANT: Create .env file (MAIN FIX)
      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.DB_URL }}" >> .env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.DB_KEY }}" >> .env
          echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      # ✅ Build project
      - name: Build Project
        run: npm run build

      # ✅ Deploy to VPS
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Deployment Started..."

            export NVM_DIR="/root/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 22

            cd /home/anantahospitality/htdocs/www.anantahospitality.com

            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com

            git reset --hard
            git pull origin master

            npm ci

            rm -rf .next

            # 🔥 Create .env on server also
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.DB_URL }}" > .env
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.DB_KEY }}" >> .env
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

            npm run build

            pm2 describe anantahospitality > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart anantahospitality
            else
              pm2 start npm --name "anantahospitality" -- start
            fi

            pm2 save

            echo "✅ Deployment Done!"
