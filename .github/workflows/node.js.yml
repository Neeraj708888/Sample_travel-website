name: CI + Deploy (Next.js Production Ready)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Install deps
      - name: Install Dependencies
        run: npm ci

      # ✅ Create ENV for build (GitHub side)
      - name: Create .env
        run: |
          cat > .env <<EOF
          DB_URL=${{ secrets.DB_URL }}
          DB_KEY=${{ secrets.DB_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      # ✅ Build project
      - name: Build Project
        run: npm run build

      # ✅ Deploy to VPS (AWS EC2)
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Deployment Started..."

            # Load Node (ubuntu user path)
            export NVM_DIR="/home/ubuntu/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 22

            # Go to project (✅ CORRECT AWS PATH)
            cd /home/ubuntu/Sample_travel-website

            # Fix git safe directory (UPDATED PATH)
            git config --global --add safe.directory /home/ubuntu/Sample_travel-website

            # Pull latest code
            git fetch --all
            git reset --hard origin/master

            # Install deps
            npm ci

            # Clean old build
            rm -rf .next

            # ✅ Create ENV on server
            cat > .env.local <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_KEY=${{ secrets.DB_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            EOF

            # Build project
            npm run build

            # ✅ PM2 safe restart (no crash)
            pm2 describe ananta-app > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ananta-app --update-env
            else
              pm2 start npm --name "ananta-app" -- start
            fi

            # Save PM2 state
            pm2 save

            echo "✅ Deployment Completed Successfully!"
