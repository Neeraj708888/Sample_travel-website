name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Node version fix
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Install dependencies
      - name: Install Dependencies
        run: npm ci

      # ✅ Build Next.js
      - name: Build Project
        run: npm run build

      # ❌ Optional (skip if no tests)
      # - name: Run Tests
      #   run: npm test
