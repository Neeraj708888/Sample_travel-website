name: CI + Deploy (Next.js + Supabase)

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - uses: actions/checkout@v4

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Install dependencies
      - name: Install Dependencies
        run: npm ci

      # ✅ Create .env (MATCHES YOUR CODE 🔥)
      - name: Create .env file
        run: |
          echo "DB_URL=${{ secrets.DB_URL }}" > .env
          echo "DB_KEY=${{ secrets.DB_KEY }}" >> .env

      # ✅ Debug (optional - remove later)
      - name: Debug ENV
        run: cat .env

      # ✅ Build project
      - name: Build Project
        run: npm run build

      # ✅ Deploy to VPS
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Deployment Started..."

            export NVM_DIR="/root/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 22

            cd /home/anantahospitality/htdocs/www.anantahospitality.com

            # Fix git safe directory
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com

            # Pull latest code
            git reset --hard
            git pull origin master

            # Install dependencies
            npm ci

            # Clean old build
            rm -rf .next

            # ✅ Create .env on server (MATCHED)
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            echo "DB_KEY=${{ secrets.DB_KEY }}" >> .env

            # Build
            npm run build

            # Restart PM2
            pm2 describe anantahospitality > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart anantahospitality
            else
              pm2 start npm --name "anantahospitality" -- start
            fi

            pm2 save

            echo "✅ Deployment Done!"
