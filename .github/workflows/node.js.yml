name: CI + Deploy (Next.js Production Ready)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Install deps
      - name: Install Dependencies
        run: npm ci

      # ✅ Create ENV for build (GitHub side)
      - name: Create .env
        run: |
          cat > .env <<EOF
          DB_URL=${{ secrets.DB_URL }}
          DB_KEY=${{ secrets.DB_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          EOF

      # ✅ Build project
      - name: Build Project
        run: npm run build

      # ✅ Deploy to VPS
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Deployment Started..."

            # Load Node
            export NVM_DIR="/root/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 22

            # Go to project
            cd /home/anantahospitality/htdocs/www.anantahospitality.com

            # Fix safe directory
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com

            # Pull latest code
            git fetch --all
            git reset --hard origin/master

            # Install deps
            npm ci

            # Clean old build
            rm -rf .next

            # ✅ Create ENV on server (MOST IMPORTANT 🔥)
            cat > .env <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_KEY=${{ secrets.DB_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            EOF

            # Fix permissions
            chown -R anantahospitality:anantahospitality /home/anantahospitality/htdocs/www.anantahospitality.com

            # Build again on server
            npm run build

            # Restart PM2 with ENV
            pm2 delete anantahospitality || true
            pm2 start npm --name "anantahospitality" -- start

            # Save PM2
            pm2 save

            echo "✅ Deployment Completed Successfully!"
