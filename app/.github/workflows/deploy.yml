name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Fix 1 - Safe directory
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com
            
            # Fix 2 - Node version update
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            
            # Deploy
            cd /home/anantahospitality/htdocs/www.anantahospitality.com
            git pull origin master
            npm install
            npm run build
            pm2 restart ananta