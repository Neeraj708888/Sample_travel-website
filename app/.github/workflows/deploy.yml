name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # ✅ Force Node 22 path (NO NVM ISSUE)
            NODE_PATH="/root/.nvm/versions/node/v22.15.0/bin"

            echo "Using Node from: $NODE_PATH"

            # ✅ Verify Node version
            $NODE_PATH/node -v
            $NODE_PATH/npm -v

            # ✅ Fix git safe directory issue
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com

            # ✅ Go to project directory
            cd /home/anantahospitality/htdocs/www.anantahospitality.com

            # ✅ Pull latest code
            git pull origin master

            # ✅ Install dependencies
            $NODE_PATH/npm ci

            # ✅ Build Next.js app
            $NODE_PATH/npm run build

            # ✅ Restart app with PM2 (zero downtime)
            pm2 reload ananta || pm2 start $NODE_PATH/npm --name "ananta" -- start