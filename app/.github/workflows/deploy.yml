name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # ✅ Direct path use karo
            export PATH="/root/.nvm/versions/node/v22.15.0/bin:$PATH"
            export NODE_PATH="/root/.nvm/versions/node/v22.15.0/lib/node_modules"
            
            # Verify
            /root/.nvm/versions/node/v22.15.0/bin/node --version
            
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com
            
            cd /home/anantahospitality/htdocs/www.anantahospitality.com
            git pull origin master
            
            /root/.nvm/versions/node/v22.15.0/bin/npm install
            /root/.nvm/versions/node/v22.15.0/bin/npm run build
            /root/.nvm/versions/node/v22.15.0/bin/pm2 restart ananta