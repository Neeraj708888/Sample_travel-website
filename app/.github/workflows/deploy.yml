name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            echo "🚀 Starting Deployment..."

            # ✅ Load Node (NVM fix)
            export NVM_DIR="/root/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 22

            # ✅ Verify Node
            node -v
            npm -v

            # ✅ Fix git safe directory issue
            git config --global --add safe.directory /home/anantahospitality/htdocs/www.anantahospitality.com

            # ✅ Go to project directory
            cd /home/anantahospitality/htdocs/www.anantahospitality.com

            # ✅ Pull latest code (force clean)
            git reset --hard
            git pull origin master

            # ✅ Install dependencies (clean install)
            npm ci --production=false

            # ✅ Remove old build (IMPORTANT)
            rm -rf .next

            # ✅ Build Next.js app
            npm run build

            # ✅ Restart PM2 (zero downtime)
            pm2 describe anantahospitality > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart anantahospitality
            else
              pm2 start npm --name "anantahospitality" -- start
            fi

            # ✅ Save PM2 process
            pm2 save

            echo "✅ Deployment Completed!"